<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADA ERROR | V.I.S.T.O DotCamera</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { width: 100%; height: 100%; display: block; }
        #status { position: absolute; top: 10px; left: 10px; color: #0f0; font-family: monospace; z-index: 10; font-size: 12px; }
    </style>
</head>
<body>
    <div id="status">SISTEMA INICIALIZANDO...</div>
    <canvas id="c"></canvas>

    <script src="https://cdn.jsdelivr.net/gh/google/swissgl@main/swissgl.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>

    <script>
        const canvas = document.getElementById('c');
        const status = document.getElementById('status');
        
        let glsl;
        try {
            glsl = SwissGL(canvas);
        } catch (e) {
            status.innerText = "ERRO: WEBGL2 NÃO SUPORTADO.";
        }

        const video = document.createElement('video');
        video.autoplay = true;
        video.muted = true;
        video.playsInline = true;

        const params = {
            rgbMode: true,
            pointSize: 4.0,
            intensity: 20.0
        };

        const gui = new dat.GUI();
        gui.add(params, 'rgbMode');
        gui.add(params, 'pointSize', 1, 15);
        gui.add(params, 'intensity', 5, 50);

        // Acesso à câmera com tratamento de erro robusto
        navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } })
        .then((stream) => {
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                status.innerText = "V.I.S.T.O ONLINE | ADA ERROR";
                setTimeout(() => status.style.display = 'none', 3000);
            };
        })
        .catch((err) => {
            status.innerText = "ERRO: CÂMERA NÃO ENCONTRADA OU BLOQUEADA.";
            console.error(err);
        });

        // Loop de renderização isolado para garantir estabilidade
        function render(time) {
            if (video.readyState >= 2) {
                glsl.loop(({canvasSize, DPR}) => {
                    // 1. Captura a textura do vídeo
                    const tex = glsl({}, {data: video, tag: 'video'});

                    // 2. Processa luminância e pontos
                    const lum = glsl({tex: tex.edge.linear, rgbMode: params.rgbMode,
                        VP: `vec2 r = vec2(ViewSize)/vec2(tex_size()); r /= max(r.x, r.y); VPos.xy = XY/r;`,
                        FP: `FOut = tex(1.0-UV); if(!rgbMode) FOut.r = dot(FOut.rgb, vec3(0.21,0.72,0.07));`
                    }, {scale: 1/2/DPR, tag: 'lum'});

                    // 3. Render final das partículas (Efeito DotCamera)
                    glsl({
                        tex: lum.edge.miplinear,
                        pointSize: params.pointSize,
                        intensity: params.intensity,
                        rgbMode: params.rgbMode,
                        canvasSize,
                        Mesh: [Math.floor(canvasSize.x/10), Math.floor(canvasSize.y/10)],
                        VP: `
                            vec2 uv = ID.xy / vec2(Grid-1);
                            vec4 c = tex(uv);
                            float l = dot(c.rgb, vec3(0.21,0.72,0.07));
                            VPos.xy = (uv + XY * pointSize * l / canvasSize) * 2.0 - 1.0;
                            varying vec3 color = rgbMode ? c.rgb : vec3(l);
                        `,
                        FP: `color * exp(-dot(XY,XY)*3.0), 1.0`
                    });
                });
            }
            requestAnimationFrame(render);
        }

        requestAnimationFrame(render);
    </script>
</body>
</html>
